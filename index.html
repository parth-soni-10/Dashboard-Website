<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="loading">
  <div class="loader-title">Content Tracker</div>
  <div class="loader-sub">Loading your watchlist…</div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<nav>
  <div class="nav-brand" onclick="navigateTo('readme')">📺 Content Tracker</div>
  <div class="nav-tabs">
    <div class="nav-tab active" data-page="readme" onclick="navigateTo('readme')">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" opacity=".6"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5"/><path d="M8 5.5v3l1.5 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Readme
    </div>
    <div class="nav-tab" data-page="current" onclick="navigateTo('current')">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" opacity=".6"><rect x="2" y="2" width="5" height="5" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="2" width="5" height="5" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="9" width="5" height="5" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="9" width="5" height="5" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
      Current Year
    </div>
    <div class="nav-tab" data-page="alltime" onclick="navigateTo('alltime')">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" opacity=".6"><polyline points="1,13 5,7 9,10 15,3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      All Time
    </div>
    <div class="nav-tab" data-page="data" onclick="navigateTo('data')">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" opacity=".6"><path d="M2 4h12M2 8h9M2 12h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Data
    </div>
    <div class="nav-tab" data-page="suggestions" onclick="navigateTo('suggestions')">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" opacity=".6"><path d="M8 1.5l1.8 3.7 4 .6-2.9 2.8.7 4L8 10.4l-3.6 1.9.7-4L2.2 5.8l4-.6z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
      Suggestions
    </div>
  </div>
</nav>

<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="app.js"></script>

</body>
</html>
